## Core scoring rules

Only included nuclei should be used for calculation.

For each included nucleus:

```text
effective HER2 count = her2_black + cluster_value
CEP17 count = cep17_red
```

Calculate:

```text
cell_count = number of included nuclei
total_her2 = sum of effective HER2 counts
total_cep17 = sum of CEP17 red counts
HER2/CEP17 ratio = total_her2 / total_cep17
average HER2 copy number = total_her2 / cell_count
```

If total CEP17 is zero, the case is not evaluable.

## ASCO/CAP dual-probe ISH group classification

Implement:

```text
Group 1: HER2/CEP17 ratio >= 2.0 and average HER2 copy number >= 4.0
Group 2: HER2/CEP17 ratio >= 2.0 and average HER2 copy number < 4.0
Group 3: HER2/CEP17 ratio < 2.0 and average HER2 copy number >= 6.0
Group 4: HER2/CEP17 ratio < 2.0 and average HER2 copy number >= 4.0 and < 6.0
Group 5: HER2/CEP17 ratio < 2.0 and average HER2 copy number < 4.0
```

For Groups 2-4, display a warning:

```text
This result requires additional evaluation with IHC correlation and/or pathologist review according to the laboratory workflow.
```

## Additional counting alert

If HER2/CEP17 ratio is between 1.8 and 2.2 inclusive, display:

```text
Borderline HER2/CEP17 ratio. Consider counting an additional 20 nuclei according to the laboratory workflow.
```

## v0.1 required features

### Image viewer

- Open jpg, jpeg, png, tif, tiff.
- Display the image.
- Support zoom.
- Support pan.
- Keep annotations aligned with the image during zoom and pan.

### ROI

- Allow the user to draw at least rectangular ROI.
- Polygon ROI is preferred if feasible.
- ROI should be visible as an overlay.
- ROI coordinates must be saved in the project JSON.

### Nucleus registration

- User can click on the image to add a nucleus.
- Each nucleus receives a unique number.
- Display nucleus number next to the clicked position.
- Draw an ellipse or circle around the registered nucleus.
- Nucleus position must be stored in image coordinates, not screen coordinates.
- The user can select a nucleus from the image or table.
- The user can delete a nucleus.
- The user can mark a nucleus as included or excluded.

### Count table

Create an editable table with columns:

- nucleus_id
- included
- x
- y
- HER2 black
- CEP17 red
- cluster value
- cluster note
- comment

Editing the table should update the calculation immediately.

### Calculation panel

Display:

- Included nucleus count
- Total HER2 count
- Total CEP17 count
- HER2/CEP17 ratio
- Average HER2 copy number
- ISH Group
- Warning messages

### Save/load

- Save project as JSON.
- Load project from JSON.
- JSON must include image path, ROI, nuclei, counts, comments, and metadata.

### CSV export

Export one row per nucleus.

CSV columns:

- case_id
- specimen_id
- image_path
- operator
- nucleus_id
- x
- y
- included
- her2_black
- cep17_red
- cluster_value
- cluster_note
- effective_her2
- comment

Also export a summary CSV or append summary rows containing:

- included_cell_count
- total_her2
- total_cep17
- her2_cep17_ratio
- average_her2_copy_number
- ish_group
- warning_messages

### Annotated PNG export

Export the original image with overlays:

- ROI outline
- nucleus numbers
- nucleus circles/ellipses
- included/excluded status
- HER2/CEP17 counts near each nucleus if possible
- summary text in a corner

Do not destroy the original image file.

