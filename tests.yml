# AGENTS.md

## Project name

HER2-DISH Counter

## Project purpose

This project is a research-use desktop application to support HER2-DISH signal counting on 40x objective microscopic images.

The application is intended to assist pathologists by recording and calculating HER2-DISH counts. It must not be presented as a standalone diagnostic device. Final interpretation must always be performed by a qualified pathologist.

## Clinical / research disclaimer

- This software is for research, education, and counting support only.
- This software must not make an autonomous clinical diagnosis.
- All final HER2 interpretation must be reviewed and approved by a pathologist.
- All outputs must include the statement:

> Research-use counting support tool. Final diagnosis and interpretation must be performed by a pathologist.

## Target image

- Bright-field HER2-DISH images.
- Images are captured using a 40x objective lens.
- Whole-slide image support is not required for the first version.
- Supported initial formats: jpg, jpeg, png, tif, tiff.

## Current development strategy

The first version must prioritize reliable manual/semi-manual workflow over full automation.

Do **not** implement full automatic nuclear segmentation in v0.1.

The application should first support:

1. Opening a 40x HER2-DISH image.
2. Zooming and panning the image.
3. Drawing ROI on the application.
4. Manually clicking tumor nuclei.
5. Assigning a nucleus number to each clicked nucleus.
6. Entering HER2 black signal count and CEP17 red signal count for each nucleus.
7. Allowing cluster correction.
8. Marking nuclei as included or excluded.
9. Calculating HER2/CEP17 ratio and average HER2 copy number.
10. Classifying the result into ASCO/CAP dual-probe ISH Groups 1-5.
11. Exporting JSON, CSV, and annotated PNG.

## Why full automatic nuclear segmentation is not the first goal

Previous ImageJ/Fiji macro-based attempts had difficulty with nuclear segmentation in HER2-DISH images.

Common problems:

- Nuclear borders are often unclear.
- Tumor nuclei are frequently crowded or overlapping.
- Black and red DISH signals may be misrecognized as small nuclei.
- Non-tumor cells may be included if nuclear detection is fully automatic.
- HER2 clusters require manual or semi-manual interpretation.
- Background dust or red haze can cause false-positive dot detection.

Therefore, in v0.1, nuclear selection must be manual. The first reliable goal is not full automation, but accurate recording, correction, calculation, and export.

## Recommended technology stack

Use Python.

Required:

- GUI: PySide6
- Image handling: Pillow, OpenCV, NumPy
- Data handling: pandas
- Export: CSV, JSON, annotated PNG
- Testing: pytest

Optional for later versions:

- scikit-image
- reportlab for PDF reports
- openpyxl for Excel export
- Cellpose or other segmentation models for future nuclear candidate detection

Do not include Cellpose, StarDist, SAM, PyTorch, or other heavy AI dependencies in v0.1 unless explicitly requested.

