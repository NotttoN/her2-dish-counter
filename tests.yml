## Keyboard shortcuts

Implement if feasible:

- Ctrl+O: open image
- Ctrl+S: save project
- Ctrl+E: export CSV
- Ctrl+P: export annotated PNG
- N: add nucleus mode
- Delete: delete selected nucleus
- I: toggle included/excluded
- B: increment HER2 black count for selected nucleus
- Shift+B: decrement HER2 black count
- R: increment CEP17 red count
- Shift+R: decrement CEP17 red count
- C: edit cluster value

## Testing requirements

At minimum, add tests for scoring.py.

Test cases:

1. Group 1 example.
2. Group 2 example.
3. Group 3 example.
4. Group 4 example.
5. Group 5 example.
6. Excluded nuclei are not counted.
7. Cluster value is added to HER2 count.
8. CEP17 total zero returns not evaluable.
9. HER2/CEP17 ratio 1.8-2.2 generates additional-count warning.

## Coding style

- Keep GUI code and scoring logic separate.
- Do not put calculation logic inside UI event handlers.
- Use type hints where practical.
- Keep functions small and testable.
- Avoid global mutable state.
- Add clear error messages.
- Do not silently ignore failed file operations.

