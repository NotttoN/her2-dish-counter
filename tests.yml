## Roadmap

### v0.1

Manual nucleus registration, manual count input, scoring, save/load, CSV export, annotated PNG export.

### v0.2

Semi-automatic black/red dot candidate detection inside manually selected nuclei.

### v0.3

PDF report, QC checklist, improved cluster workflow, better audit trail.

### v0.4

Nuclear candidate detection using a trainable model or classical image processing, but still requiring user confirmation.

### v1.0

Validated internal research-use package with documented test images and known limitations.

## Important constraints

- Do not claim diagnostic approval.
- Do not implement autonomous final diagnosis.
- Do not prioritize full automation over verifiable manual workflow.
- Do not include heavy AI dependencies in v0.1.
- Do not break image-coordinate consistency during zoom and pan.
- Do not overwrite original images.
